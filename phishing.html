<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giveaway UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
    }

    .screen{
      width:100%;
      height:100vh;
      display:none;
      flex-direction:column;
      background:#f4f4f4;
    }

    .active{
      display:flex;
    }

    /* TOP BAR */
    .topbar{
      background:#0057c2;
      color:white;
      padding:20px;
      text-align:center;
      font-size:32px;
      font-weight:bold;
      position:relative;
    }

    .back-btn{
      position:absolute;
      left:20px;
      top:20px;
      font-size:30px;
      cursor:pointer;
    }

    /* HOME */
    .home-content{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:30px;
      text-align:center;
    }

    .title{
      font-size:60px;
      font-weight:900;
      margin-bottom:30px;
      line-height:1.1;
    }

    .subtitle{
      font-size:28px;
      color:#333;
      margin-bottom:40px;
      line-height:1.4;
    }

    .gift{
      font-size:160px;
      margin-bottom:50px;
    }

    hr{
      width:100%;
      border:none;
      border-top:2px solid #ccc;
      margin-bottom:50px;
    }

    .btn{
      background:#0057c2;
      color:white;
      border:none;
      width:90%;
      padding:25px;
      border-radius:20px;
      font-size:40px;
      font-weight:bold;
      cursor:pointer;
    }

    /* REGISTER */
    .register-content{
      padding:40px;
    }

    .register-title{
      text-align:center;
      margin-top:20px;
      margin-bottom:40px;
    }

    .register-title h1{
      font-size:50px;
      margin-bottom:10px;
    }

    .register-title p{
      font-size:24px;
      color:#666;
    }

    .label{
      font-size:36px;
      font-weight:bold;
      margin-top:30px;
      margin-bottom:15px;
      display:block;
    }

    .input-box{
      width:100%;
      padding:25px;
      border:2px solid #ddd;
      border-radius:18px;
      font-size:28px;
      outline:none;
      background:white;
    }

    .register-btn{
      margin-top:50px;
      width:100%;
    }

    .login{
      text-align:center;
      margin-top:30px;
      font-size:28px;
    }

    .login span{
      color:#0057c2;
      cursor:pointer;
    }

    @media(max-width:768px){

      .title{
        font-size:42px;
      }

      .subtitle{
        font-size:22px;
      }

      .btn{
        font-size:28px;
      }

      .register-title h1{
        font-size:36px;
      }

      .label{
        font-size:24px;
      }

      .input-box{
        font-size:20px;
      }
    }
  </style>
</head>

<body>

  <!-- HOME SCREEN -->
  <div class="screen active" id="homeScreen">

    <div class="topbar"></div>

    <div class="home-content">

      <div class="title">
        FREE CELLPHONE <br>
        GIVEAWAY!
      </div>

      <div class="subtitle">
        Click the link below <br>
        and register now!
      </div>

      <div class="gift">🎁</div>

      <hr>

      <button class="btn" onclick="goToRegister()">
        REGISTER NOW
      </button>

    </div>
  </div>

  <!-- REGISTER SCREEN -->
  <div class="screen" id="registerScreen">

    <div class="topbar">
      <span class="back-btn" onclick="goBack()">←</span>
      Registration
    </div>

    <div class="register-content">

      <div class="register-title">
        <h1>Create Your Account</h1>
        <p>Fill in the details below to register.</p>
      </div>

      <label class="label">Email</label>
      <input type="email" class="input-box" placeholder="Enter your email">

      <label class="label">Password</label>
      <input type="password" class="input-box" placeholder="Enter your password">

      <label class="label">Phone Number</label>
      <input type="text" class="input-box" placeholder="Enter your phone number">

      <button class="btn register-btn">
        REGISTER
      </button>

      <div class="login">
        Already have an account?
        <span>Log in</span>
      </div>

    </div>
  </div>

  <script>

    function goToRegister(){
      document.getElementById("homeScreen").classList.remove("active");
      document.getElementById("registerScreen").classList.add("active");
    }

    function goBack(){
      document.getElementById("registerScreen").classList.remove("active");
      document.getElementById("homeScreen").classList.add("active");
    }

  </script>

</body>
</html>
