<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Giveaway</title>
  <link rel="stylesheet" href="phish.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <div class="screen active" id="homeScreen">

    <div class="topbar"></div>

    <div class="home-content">

      <div class="title">
        FREE CELLPHONE <br>
        GIVEAWAY!
      </div>

      <div class="subtitle">
        Click the link below <br>
        and register now!
      </div>

      <div class="gift">🎁</div>

      <hr>

      <button class="btn" onclick="goToRegister()">
        REGISTER NOW
      </button>

    </div>
  </div>

  <!-- REGISTER SCREEN -->
  <div class="screen" id="registerScreen">

    <div class="topbar">
      <span class="back-btn" onclick="goBack()">←</span>
      Registration
    </div>

    <div class="register-content">

      <div class="register-title">
        <h1>Create Your Account</h1>
        <p>Fill in the details below to register.</p>
      </div>

      <label class="label">Email</label>
      <input type="email" class="input-box" placeholder="Enter your email">

      <label class="label">Password</label>
      <input type="password" class="input-box" placeholder="Enter your password">

      <label class="label">Phone Number</label>
      <input type="text" class="input-box" placeholder="Enter your phone number">

      <button class="btn register-btn">
        REGISTER
      </button>

      <div class="login">
        Already have an account?
        <span>Log in</span>
      </div>

    </div>
  </div>

  <script src="phish.js"></script>
</body>
</html>
